spring:
  application:
    name: user-service
  datasource:
    url: jdbc:mysql://localhost:3306/hospital_management?useSSL=false&serverTimezone=UTC
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
  security:
    jwt:
      secret: hospital-management-user-service-jwt-secret-key-please-change-in-production-environment-2024
      expiration: 86400000

server:
  port: 8082

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}

logging:
  level:
    root: INFO
    hospital.management.user: DEBUG

springdoc:
  swagger-ui:
    enabled: true

  api-docs:
    enabled: true

  override-with-generic-response: false

  default-produces-media-type: application/json

