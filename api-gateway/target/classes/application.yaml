spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        # User Service Routes
        - id: user-service-auth
          uri: lb://user-service
          predicates:
            - Path=/api/auth/**
          filters:
            - RewritePath=/api(?<segment>/?.*), $\{segment}

        # Admin Service Routes
        - id: admin-service
          uri: lb://admin-service
          predicates:
            - Path=/api/admin/**
          filters:
            - RewritePath=/api(?<segment>/?.*), $\{segment}

        # Hospital Service Routes
        - id: hospital-service-appointments
          uri: lb://hospital-service
          predicates:
            - Path=/api/appointments/**
          filters:
            - RewritePath=/api(?<segment>/?.*), $\{segment}

        - id: hospital-service-doctors
          uri: lb://hospital-service
          predicates:
            - Path=/api/doctors/**
          filters:
            - RewritePath=/api(?<segment>/?.*), $\{segment}

        - id: hospital-service-patients
          uri: lb://hospital-service
          predicates:
            - Path=/api/patients/**
          filters:
            - RewritePath=/api(?<segment>/?.*), $\{segment}

        - id: hospital-service-prescriptions
          uri: lb://hospital-service
          predicates:
            - Path=/api/prescriptions/**
          filters:
            - RewritePath=/api(?<segment>/?.*), $\{segment}

        - id: hospital-service-medications
          uri: lb://hospital-service
          predicates:
            - Path=/api/medications/**
          filters:
            - RewritePath=/api(?<segment>/?.*), $\{segment}

server:
  port: 8080

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

