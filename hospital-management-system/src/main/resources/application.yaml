spring:
  application:
    name: hospital-service
  datasource:
    url: jdbc:mysql://localhost:3306/hospital_management?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: root

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  security:
    jwt:
      secret: hospital-management-user-service-jwt-secret-key-please-change-in-production-environment-2024
      expiration: 86400000

server:
  port: 8081

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}

logging:
  level:
    root: INFO
    hospital.management.system: DEBUG
    
springdoc:
  swagger-ui:
    enabled: true

  api-docs:
    enabled: true

  override-with-generic-response: false

  default-produces-media-type: application/json

